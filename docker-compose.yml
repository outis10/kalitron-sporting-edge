services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sporting_edge
      POSTGRES_USER: sporting
      POSTGRES_PASSWORD: edge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sporting -d sporting_edge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn sporting_edge.api.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://sporting:edge@db:5432/sporting_edge
      DATABASE_URL_SYNC: postgresql://sporting:edge@db:5432/sporting_edge
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs

volumes:
  pgdata:
